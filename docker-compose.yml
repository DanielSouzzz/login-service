services:
  nginx:
    image: nginx:alpine
    container_name: nginx-proxy
    ports:
      - "80:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - app
    networks:
      - app-network
    restart: always

  app:
    build: .
    env_file:
      - .env
    depends_on:
      - db
    networks:
      - app-network
    restart: always

  db:
    image: mysql:8.0.36
    environment:
      - MYSQL_ROOT_PASSWORD=${MYSQL_ROOT_PASSWORD}
      - MYSQL_DATABASE=dblogin
      - MYSQL_USER=${SPRING_DATASOURCE_USERNAME}
      - MYSQL_PASSWORD=${SPRING_DATASOURCE_PASSWORD}
    networks:
      - app-network
    volumes:
      - db_data:/var/lib/mysql
    restart: always

  redis-auth:
    image: redis:7-alpine
    container_name: redis-auth
    networks:
      - app-network
    restart: always

networks:
  app-network:
    driver: bridge

volumes:
  db_data:
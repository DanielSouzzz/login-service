services:
  nginx:
    image: nginx:alpine
    container_name: nginx-proxy
    ports:
      - "80:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - app
    networks:
      - app-network
    restart: always

  app:
    build: .
    environment:
      - SPRING_DATASOURCE_URL=jdbc:mysql://db:3306/dblogin?useSSL=false&serverTimezone=UTC
      - SPRING_DATASOURCE_USERNAME=app_user
      - SPRING_DATASOURCE_PASSWORD=${DB_PASSWORD}
    depends_on:
      - db
    networks:
      - app-network
    restart: always

  db:
    image: mysql:8.0.36
    environment:
      - MYSQL_ROOT_PASSWORD=${MYSQL_ROOT_PASSWORD}
      - MYSQL_DATABASE=dblogin
      - MYSQL_USER=app_user
      - MYSQL_PASSWORD=${DB_PASSWORD}
    networks:
      - app-network
    volumes:
      - db_data:/var/lib/mysql
    restart: always

networks:
  app-network:
    driver: bridge

volumes:
  db_data:
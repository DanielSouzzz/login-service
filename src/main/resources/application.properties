# Config de datasource
spring.datasource.url=jdbc:mysql://db:3306/dblogin?useSSL=false&serverTimezone=UTC
spring.datasource.username=app_user
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Exibe as queries do Hibernate nos logs
#spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Impede que o Hibernate tente traduzir os nomes das colunas
spring.jpa.hibernate.naming.physical-strategy=org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl
/home/daniel/homolog/login-service/src/main/resources/application.properties

# Config de DDL
spring.jpa.hibernate.ddl-auto=none

# Pool de conexoes
spring.datasource.hikari.maximum-pool-size=5